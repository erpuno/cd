---
# erp-ai - allow to core (registry, db) + telemetry (metrics) + security (auth) + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-allow-internal
  namespace: erp-ai
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
  # Access to erp-infra (registry, kvs-database)
  - to:
    - namespaceSelector:
        matchLabels:
          name: erp-infra
    ports:
    - protocol: TCP
      port: 5000
    - protocol: TCP
      port: 8301
  # Access to erp-telemetry (prometheus)
  - to:
    - namespaceSelector:
        matchLabels:
          name: erp-telemetry
    ports:
    - protocol: TCP
      port: 9090
  # Access to erp-security (auth)
  - to:
    - namespaceSelector:
        matchLabels:
          name: erp-security
    ports:
    - protocol: TCP
      port: 8204
  # DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # External HTTPS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
---

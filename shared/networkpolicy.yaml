---
# Deny-all baseline for each namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-deny-all
  namespace: erp-infra
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-deny-all
  namespace: erp-telemetry
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-deny-all
  namespace: erp-security
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-deny-all
  namespace: erp-ai
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-deny-all
  namespace: erp-apps
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow internal + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-allow-internal
  namespace: erp-infra
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from same namespace
  - from:
    - podSelector: {}
  # Allow from other ERP namespaces
  - from:
    - namespaceSelector:
        matchLabels:
          name: erp-telemetry
    - namespaceSelector:
        matchLabels:
          name: erp-security
    - namespaceSelector:
        matchLabels:
          name: erp-ai
    - namespaceSelector:
        matchLabels:
          name: erp-apps
  egress:
  # Allow to same namespace
  - to:
    - podSelector: {}
  # Allow DNS queries
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow external HTTPS (pulls, updates)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
---
# erp-telemetry - allow all internal + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-allow-internal
  namespace: erp-telemetry
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
  - from:
    - namespaceSelector:
        matchLabels:
          name: erp-infra
    - namespaceSelector:
        matchLabels:
          name: erp-security
    - namespaceSelector:
        matchLabels:
          name: erp-ai
    - namespaceSelector:
        matchLabels:
          name: erp-apps
  egress:
  - to:
    - podSelector: {}
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

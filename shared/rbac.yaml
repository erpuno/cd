apiVersion: v1
kind: ServiceAccount
metadata:
  name: erp-security-sa
  namespace: erp-security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: erp-security-role
  namespace: erp-security
rules:
- apiGroups: [""]
  resources: ["pods", "endpoints", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: erp-security-rolebinding
  namespace: erp-security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: erp-security-role
subjects:
- kind: ServiceAccount
  name: erp-security-sa
  namespace: erp-security

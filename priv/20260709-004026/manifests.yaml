kind: List
metadata:
  resourceVersion: ''
---
apiVersion: v1
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: '1'
    labels:
      app: ca-pki
    name: ca-pki
    namespace: erp-security
  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: ca-pki
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: ca-pki
      spec:
        containers:
        - args:
          - start
          command:
          - bin/ca
          env:
          - name: ERL_AFLAGS
            value: "+S 1 +SDcpu 1 +SDio 1 -sbt db +A 16 -env ERL_MAX_PORTS 262144"
          image: erpuno/ca-pki:latest
          imagePullPolicy: IfNotPresent
          name: ca-pki
          ports:
          - containerPort: 8047
            name: est
            protocol: TCP
          - containerPort: 8829
            name: cmp
            protocol: TCP
          - containerPort: 5318
            name: cmc
            protocol: TCP
          resources:
            limits:
              cpu: 300m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: "/app/synrc"
            name: keys
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        serviceAccount: erp-security-sa
        serviceAccountName: erp-security-sa
        terminationGracePeriodSeconds: 30
        volumes:
        - name: keys
          persistentVolumeClaim:
            claimName: ca-pki-data
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: '1'
    labels:
      app: ldap-directory
    name: ldap-directory
    namespace: erp-security
  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: ldap-directory
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: ldap-directory
      spec:
        containers:
        - args:
          - start
          command:
          - bin/ldap
          env:
          - name: ERL_AFLAGS
            value: "+S 1 +SDcpu 1 +SDio 1 -sbt db +A 16 -env ERL_MAX_PORTS 262144"
          image: erpuno/ldap:latest
          imagePullPolicy: IfNotPresent
          name: ldap-directory
          ports:
          - containerPort: 389
            name: ldap
            protocol: TCP
          resources:
            limits:
              cpu: 300m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: "/app/db"
            name: ldap-db
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        serviceAccount: erp-security-sa
        serviceAccountName: erp-security-sa
        terminationGracePeriodSeconds: 30
        volumes:
        - name: ldap-db
          persistentVolumeClaim:
            claimName: ldap-directory-data
- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: ca-pki-data
    namespace: erp-security
  spec:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
    storageClassName: local-path
    volumeMode: Filesystem
- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: ldap-directory-data
    namespace: erp-security
  spec:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:

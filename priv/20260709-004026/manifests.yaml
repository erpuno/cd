---
apiVersion: v1
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: '1'
    labels:
      app: docker-registry
    name: docker-registry
    namespace: erp-infra
  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: docker-registry
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: docker-registry
      spec:
        containers:
        - image: registry:2.8.3
          imagePullPolicy: IfNotPresent
          name: registry
          ports:
          - containerPort: 5000
            name: http
            protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: "/var/lib/registry"
            name: storage
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        serviceAccount: erp-infra-sa
        serviceAccountName: erp-infra-sa
        terminationGracePeriodSeconds: 30
        volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: registry-data
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: '1'
    labels:
      app: ns-dns
    name: ns-dns
    namespace: erp-infra
  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: ns-dns
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: ns-dns
      spec:
        containers:
        - args:
          - start
          command:
          - bin/ns
          env:
          - name: ERL_AFLAGS
            value: "+S 1 +SDcpu 1 +SDio 1 -sbt db +A 16 -env ERL_MAX_PORTS 262144"
          image: erpuno/ns:latest
          imagePullPolicy: IfNotPresent
          name: ns-dns
          ports:
          - containerPort: 53
            name: dns-udp
            protocol: UDP
          - containerPort: 53
            name: dns-tcp
            protocol: TCP
          resources:
            limits:
              cpu: 300m
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: File
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        serviceAccount: erp-infra-sa
        serviceAccountName: erp-infra-sa
        terminationGracePeriodSeconds: 30
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations:
      deployment.kubernetes.io/revision: '1'
    name: traefik
    namespace: erp-infra
  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: traefik
    strategy:
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: traefik
      spec:
        containers:
        - args:
          - "--entrypoints.web.address=:80"
          - "--providers.kubernetesingress=true"
          - "--providers.kubernetesingress.ingressclass=traefik"
          - "--log.level=WARN"
          image: traefik:v3.3
          imagePullPolicy: IfNotPresent
          name: traefik
          ports:
          - containerPort: 80
            hostPort: 80
            name: web
            protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          terminationMessagePath: "/dev/termination-log"
          terminationMessagePolicy: File
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        serviceAccount: traefik
        serviceAccountName: traefik
        terminationGracePeriodSeconds: 30
- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: registry-data
    namespace: erp-infra
  spec:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
    storageClassName: local-path
    volumeMode: Filesystem
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: docker-registry
    name: docker-registry
    namespace: erp-infra
  spec:
    clusterIP: 10.96.233.44
    clusterIPs:
    - 10.96.233.44
    internalTrafficPolicy: Cluster
    ipFamilies:
    - IPv4
    ipFamilyPolicy: SingleStack
    ports:
    - name: http
      port: 5000
      protocol: TCP
      targetPort: 5000
    selector:
      app: docker-registry
    sessionAffinity: None
    type: ClusterIP
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: ns-dns
    name: ns-dns
    namespace: erp-infra
  spec:
    clusterIP: 10.96.185.66
    clusterIPs:
    - 10.96.185.66
    internalTrafficPolicy: Cluster
    ipFamilies:
    - IPv4
    ipFamilyPolicy: SingleStack
    ports:

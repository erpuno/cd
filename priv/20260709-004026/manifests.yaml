    storageClassName: local-path
    volumeMode: Filesystem
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: ca-pki
    name: ca-pki
    namespace: erp-security
  spec:
    clusterIP: 10.96.111.136
    clusterIPs:
    - 10.96.111.136
    internalTrafficPolicy: Cluster
    ipFamilies:
    - IPv4
    ipFamilyPolicy: SingleStack
    ports:
    - name: est
      port: 8047
      protocol: TCP
      targetPort: 8047
    - name: cmp
      port: 8829
      protocol: TCP
      targetPort: 8829
    - name: cmc
      port: 5318
      protocol: TCP
      targetPort: 5318
    selector:
      app: ca-pki
    sessionAffinity: None
    type: ClusterIP
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: ldap-directory
    name: ldap-directory
    namespace: erp-security
  spec:
    clusterIP: 10.96.176.106
    clusterIPs:

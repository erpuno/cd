- apiVersion: v1
  data:
    config.yaml: |
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
        prometheus:
          config:
            scrape_configs:
              - job_name: 'otel-collector'
                scrape_interval: 10s
                static_configs:
                  - targets: ['0.0.0.0:8888']

      processors:
        batch:
        memory_limiter:
          check_interval: 1s
          limit_percentage: 75
          spike_limit_percentage: 15

      exporters:
        prometheus:
          endpoint: 0.0.0.0:8889
          namespace: otel
        otlp:
          endpoint: http://localhost:4317
        debug:
          verbosity: detailed

      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        zpages:
          endpoint: 0.0.0.0:55679

      service:
        extensions: [health_check, zpages]
        pipelines:
          metrics:
            receivers: [otlp, prometheus]
            processors: [memory_limiter, batch]
            exporters: [prometheus, debug]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [debug]

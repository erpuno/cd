- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: prometheus
    name: prometheus
    namespace: erp-telemetry
  spec:
    clusterIP: None
    clusterIPs:
    - None
    internalTrafficPolicy: Cluster
    ipFamilies:
    - IPv4
    ipFamilyPolicy: SingleStack
    ports:
    - name: http
      port: 9090
      protocol: TCP
      targetPort: 9090
    selector:
      app: prometheus
    sessionAffinity: None
    type: ClusterIP
- apiVersion: v1
  data:
    datasources.yaml: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          jsonData:
            httpMethod: POST
        - name: OpenSearch-Logs
          type: grafana-opensearch-datasource
          uid: opensearch-logs
          access: proxy
          url: http://opensearch:9200
          jsonData:
            database: "otel-logs"
            version: "2.14.0"
            timeField: "@timestamp"
            interval: Daily
            derivedFields:
              - datasourceUid: opensearch-traces
                matcherRegex: '"traceId":\s*"([^"]+)"'
                name: TraceID
                url: "$${__value.raw}"
        - name: OpenSearch-Traces
          type: grafana-opensearch-datasource
          uid: opensearch-traces
          access: proxy
          url: http://opensearch:9200
          jsonData:
            database: "otel-traces"
            version: "2.14.0"
            timeField: "@timestamp"
            interval: Daily
  kind: ConfigMap
  metadata:
    labels:
      app: grafana
    name: grafana-datasources
    namespace: erp-telemetry

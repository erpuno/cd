    labels:
      app: otel-collector
    name: otel-collector-config
    namespace: erp-telemetry
- apiVersion: v1
  data:
    prometheus.yml: |
      global:
        scrape_interval: 10s
        evaluation_interval: 10s

      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']

        - job_name: 'otel-collector'
          static_configs:
            - targets: ['otel-collector:8889']

- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: otel-collector
    name: otel-collector
    namespace: erp-telemetry
  spec:
    clusterIP: 10.96.69.97
    clusterIPs:
    - 10.96.69.97
    internalTrafficPolicy: Cluster
    ipFamilies:
    - IPv4
    ipFamilyPolicy: SingleStack
    ports:
    - name: otlp-grpc
      port: 4317
      protocol: TCP

        prometheus:
          endpoint: 0.0.0.0:8889
          namespace: otel
        debug:
          verbosity: detailed

      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        zpages:
          endpoint: 0.0.0.0:55679

      service:
        extensions: [health_check, zpages]
        pipelines:
          metrics:
            receivers: [otlp, prometheus]
            processors: [memory_limiter, batch]
            exporters: [prometheus, debug]
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [debug]
          logs:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [debug]
        telemetry:
          logs:
            level: "info"

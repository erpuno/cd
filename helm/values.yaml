---
global:
  domain: erp.uno
  environment: production
  registry: docker.io
  imagePullPolicy: IfNotPresent
  version: 2024.6.15
namespaces:
  erp-ai:
    enabled: true
    tier: ai
  erp-apps:
    enabled: true
    tier: application
  erp-infra:
    enabled: true
    tier: infrastructure
  erp-security:
    enabled: true
    tier: security
  erp-services:
    enabled: true
    tier: application
  erp-telemetry:
    enabled: true
    tier: observability
services:
  erp-ai:
    ai-generation:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/ai
      tag: 2024.6.15
      port: 8080
  erp-apps:
    acc-accounting:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/acc
      tag: 2024.6.15
      port: 8080
    cart-registers:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/cart
      tag: 2024.6.15
      port: 8080
    crm-documents:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/crm
      tag: 2024.6.15
      port: 8080
    hl7-health:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/hl7-health
      tag: 2024.6.15
      port: 8502
      protocol: TCP
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
        targetCPUUtilization: 75
    itsm-incidents:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/itsm
      tag: 2024.6.15
      port: 8080
    lms-education:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/lms-education
      tag: 2024.6.15
      port: 8506
      protocol: TCP
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
        targetCPUUtilization: 75
    pm-projects:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/pm
      tag: 2024.6.15
      port: 8080
    wms-warehouse:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/warehouse
      tag: 2024.6.15
      port: 8080
  erp-infra:
    docker-registry:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
      image: registry
      tag: 2.8.3
      port: 5000
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        mountPath: "/data"
    ns-dns:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/ns
      tag: 2024.6.15
      port: 8080
    traefik-ingress:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/traefik-ingress
      tag: 2024.6.15
      port: 8080
  erp-security:
    ca-pki:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/ca
      tag: 2024.6.15
      port: 8080
  erp-services:
    bpe-engine:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/bpe
      tag: 2024.6.15
      port: 8080
    chat-messenger:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/chat
      tag: 2024.6.15
      port: 8080
    kvs-database:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/kvs
      tag: 2024.6.15
      port: 8080
    n2o-server:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/n2o
      tag: 2024.6.15
      port: 8080
    rest-bpe:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/rest
      tag: 2024.6.15
      port: 8080
  erp-telemetry:
    grafana:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
      image: grafana/grafana
      tag: 11.1.0
      port: 3000
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        mountPath: "/data"
    loki:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: grafana/loki
      tag: 3.1.0
      port: 8080
    otel-collector:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: otel/opentelemetry-collector-contrib
      tag: 0.102.0
      port: 8080
    prometheus:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      image: prom/prometheus
      tag: v2.53.0
      port: 9090
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        mountPath: "/data"
rbac:
  create: true
networkPolicy:
  enabled: true
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: false
  hosts:
  - host: erp.uno
    paths:
    - path: "/"
      service: nitro-portal
      namespace: erp-services
      port: 8510

---
global:
  domain: erp.uno
  environment: production
  registry: docker.io
  imagePullPolicy: IfNotPresent
  version: 2024.6.15
namespaces:
  erp-ai:
    enabled: true
    tier: ai
  erp-apps:
    enabled: true
    tier: application
  erp-infra:
    enabled: true
    tier: infrastructure
  erp-security:
    enabled: true
    tier: security
  erp-services:
    enabled: true
    tier: application
  erp-telemetry:
    enabled: true
    tier: observability
services:
  erp-ai: {}
  erp-apps: {}
  erp-infra:
    docker-registry:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
      image: registry
      tag: 2.8.3
      port: 5000
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: standard
        mountPath: "/var/lib/registry"
    ns-dns:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 300m
          memory: 2Gi
      image: erpuno/ns
      port: 53
      tag: latest
      protocol: UDP
    traefik-ingress:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      image: erpuno/traefik-ingress
      tag: 2024.6.15
      port: 8080
  erp-security:
    ca-pki:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 300m
          memory: 2Gi
      image: erpuno/ca-pki
      tag: latest
      port: 8047
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: standard
        mountPath: "/app/synrc"
    ldap-directory:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 300m
          memory: 2Gi
      image: erpuno/ldap
      port: 389
      tag: latest
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: standard
        mountPath: "/app/db"
  erp-services: {}
  erp-telemetry:
    grafana:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 30m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
      image: grafana/grafana
      tag: 11.1.0
      port: 3000
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: standard
        mountPath: "/var/lib/grafana"
    opensearch:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 768Mi
      image: opensearchproject/opensearch
      tag: 2.14.0
      port: 9200
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: standard
        mountPath: "/usr/share/opensearch/data"
    otel-collector:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 30m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
      image: otel/opentelemetry-collector-contrib
      port: 4317
      tag: 0.102.0
      protocol: TCP
    prometheus:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      image: prom/prometheus
      tag: v2.53.0
      port: 9090
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        storageClassName: standard
        mountPath: "/prometheus"
rbac:
  create: true
networkPolicy:
  enabled: true
ingress:
  enabled: false
  className: nginx
  tls:
    enabled: false
  hosts: []

---
global:
  domain: erp.uno
  environment: production
  registry: docker.io
  imagePullPolicy: IfNotPresent
  version: 2024.6.15
namespaces:
  erp-ai:
    enabled: true
    tier: application
  erp-apps:
    enabled: true
    tier: application
  erp-infra:
    enabled: true
    tier: infrastructure
  erp-security:
    enabled: true
    tier: security
  erp-services:
    enabled: true
    tier: application
  erp-telemetry:
    enabled: true
    tier: observability
services:
  erp-ai:
    ai-generation:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
  erp-apps:
    acc-accounting:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    cart-registers:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    crm-documents:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    hl7-health:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8502
      image: hl7-health
      protocol: TCP
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
        targetCPUUtilization: 75
    itsm-incidents:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    lms-education:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8506
      image: lms-education
      protocol: TCP
      hpa:
        enabled: true
        minReplicas: 2
        maxReplicas: 6
        targetCPUUtilization: 75
    pm-projects:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    wms-warehouse:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
  erp-infra:
    docker-registry:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
      port: 5000
      image: registry
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        mountPath: "/data"
    ns-dns:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
  erp-security:
    ca-pki:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
  erp-services:
    bpe-engine:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    chat-messenger:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    kvs-database:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    n2o-server:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    rest-bpe:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
  erp-telemetry:
    grafana:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
      port: 3000
      image: grafana
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        mountPath: "/data"
    loki:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    otel-collector:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      port: 8080
    prometheus:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      port: 9090
      image: prometheus
      protocol: TCP
      persistence:
        enabled: true
        size: 10Gi
        mountPath: "/data"
rbac:
  create: true
networkPolicy:
  enabled: true
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: false
  hosts:
  - host: erp.uno
    paths:
    - path: "/"
      service: nitro-portal
      namespace: erp-services
      port: 8510

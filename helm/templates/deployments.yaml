{{- range $namespace, $services := .Values.services }}
{{- if (index $.Values.namespaces $namespace).enabled }}
---
# Deployments for {{ $namespace }}
{{- range $serviceName, $service := $services }}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: {{ if $service.persistence }}StatefulSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ $serviceName }}
  namespace: {{ $namespace }}
  labels:
    app: {{ $serviceName }}
    namespace: {{ $namespace }}
spec:
  {{- if $service.persistence }}
  serviceName: {{ $serviceName }}
  {{- end }}
  replicas: {{ $service.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $serviceName }}
  template:
    metadata:
      labels:
        app: {{ $serviceName }}
    spec:
      serviceAccountName: {{ $namespace }}-sa
      containers:
      - name: {{ $serviceName }}
        image: {{ $.Values.global.registry }}/{{ $service.image }}:{{ $service.tag }}
        imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
        {{- if $service.command }}
        command:
        {{- toYaml $service.command | nindent 8 }}
        {{- end }}
        {{- if $service.args }}
        args:
        {{- toYaml $service.args | nindent 8 }}
        {{- end }}
        {{- if $service.env }}
        env:
        {{- toYaml $service.env | nindent 8 }}
        {{- end }}
        {{- if $service.port }}
        ports:
        - name: http
          containerPort: {{ $service.port }}
        {{- else if $service.ports }}
        ports:
        {{- range $portName, $portNum := $service.ports }}
        - name: {{ $portName }}
          containerPort: {{ $portNum }}
        {{- end }}
        {{- end }}
        {{- if $service.resources }}
        resources:
          {{- toYaml $service.resources | nindent 10 }}
        {{- end }}
        {{- if $service.persistence }}
        volumeMounts:
        - name: data
          mountPath: {{ $service.persistence.mountPath }}
        {{- end }}
  {{- if $service.persistence }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ $service.persistence.storageClassName | default "standard" }}
      resources:
        requests:
          storage: {{ $service.persistence.size }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

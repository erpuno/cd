{{- range $namespace, $services := .Values.services }}
{{- if (index $.Values.namespaces $namespace).enabled }}
{{- range $serviceName, $service := $services }}
{{- if and $service.enabled $service.hpa $service.hpa.enabled }}
---
# HPA for {{ $namespace }}/{{ $serviceName }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $serviceName }}
  namespace: {{ $namespace }}
  labels:
    app: {{ $serviceName }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ if $service.persistence }}StatefulSet{{ else }}Deployment{{ end }}
    name: {{ $serviceName }}
  minReplicas: {{ $service.hpa.minReplicas }}
  maxReplicas: {{ $service.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $service.hpa.targetCPUUtilization }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
{{- end }}
{{- end }}
{{- end }}
{{- end }}

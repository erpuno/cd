apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: erp-telemetry
  labels:
    app: opensearch
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      serviceAccountName: erp-telemetry-sa
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:2.14.0
        env:
        - name: discovery.type
          value: single-node
        - name: plugins.security.disabled
          value: "true"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: "TestPassword@2024"
        ports:
        - name: http
          containerPort: 9200
          protocol: TCP
        - name: transport
          containerPort: 9300
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 768Mi
        volumeMounts:
        - name: storage
          mountPath: /usr/share/opensearch/data
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: opensearch-data

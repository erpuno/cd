# Prometheus values
prometheus:
  enabled: true
  replicaCount: 1
  image: prom/prometheus:v2.53.0
  port: 9090
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 50Gi
    mountPath: /prometheus
  probes:
    enabled: true
    initialDelaySeconds: 15

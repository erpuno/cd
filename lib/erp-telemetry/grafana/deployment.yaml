apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: erp-telemetry
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: erp-telemetry-sa
      containers:
      - name: grafana
        image: grafana/grafana:11.1.0
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_PLUGINS_ALLOW_UI_UPDATES
          value: "true"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: storage
          mountPath: /var/lib/grafana
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: grafana-data
      - name: datasources
        configMap:
          name: grafana-datasources
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: erp-telemetry
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          httpMethod: POST
      - name: OpenSearch-Logs
        type: grafana-opensearch-datasource
        uid: opensearch-logs
        access: proxy
        url: http://opensearch:9200
        jsonData:
          database: "otel-logs"
          version: "2.14.0"
          timeField: "@timestamp"
          interval: Daily
          derivedFields:
            - datasourceUid: opensearch-traces
              matcherRegex: '"traceId":\s*"([^"]+)"'
              name: TraceID
              url: "$${__value.raw}"
      - name: OpenSearch-Traces
        type: grafana-opensearch-datasource
        uid: opensearch-traces
        access: proxy
        url: http://opensearch:9200
        jsonData:
          database: "otel-traces"
          version: "2.14.0"
          timeField: "@timestamp"
          interval: Daily


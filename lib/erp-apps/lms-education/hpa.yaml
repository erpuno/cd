apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lms-education
  namespace: erp-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lms-education
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

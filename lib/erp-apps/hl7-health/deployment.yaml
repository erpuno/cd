apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl7-health
  namespace: erp-services
  labels:
    app: hl7-health
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hl7-health
  template:
    metadata:
      labels:
        app: hl7-health
    spec:
      serviceAccountName: erp-services-sa
      containers:
      - name: hl7-health
        image: erpuno/hl7-health:2024.6.15
        ports:
        - name: http
          containerPort: 8502
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - hl7-health
              topologyKey: kubernetes.io/hostname

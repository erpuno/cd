apiVersion: apps/v1
kind: Deployment
metadata:
  name: ldap-directory
  namespace: erp-security
  labels:
    app: ldap-directory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ldap-directory
  template:
    metadata:
      labels:
        app: ldap-directory
    spec:
      serviceAccountName: erp-security-sa
      containers:
      - name: ldap-directory
        image: erpuno/ldap:latest
        command: ["bin/ldap"]
        args: ["start"]
        imagePullPolicy: IfNotPresent
        ports:
        - name: ldap
          containerPort: 389
        env:
        - name: ERL_AFLAGS
          value: "+S 2 +SDcpu 2 +SDio 2 +MMscs 5 -sbt db"
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 500m
            memory: 4Gi
        volumeMounts:
        - name: ldap-db
          mountPath: /app/db
      volumes:
      - name: ldap-db
        persistentVolumeClaim:
          claimName: ldap-directory-data

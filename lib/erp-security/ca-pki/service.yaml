apiVersion: v1
kind: Service
metadata:
  name: ca-pki
  namespace: erp-security
  labels:
    app: ca-pki
spec:
  type: ClusterIP
  ports:
  - name: est
    port: 8047
    targetPort: 8047
  - name: cmp
    port: 8829
    targetPort: 8829
  - name: cmc
    port: 5318
    targetPort: 5318
  selector:
    app: ca-pki

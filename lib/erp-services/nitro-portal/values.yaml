# Nitro Portal (UI)
nitro-portal:
  enabled: true
  replicaCount: 2
  image: erpuno/nitro-portal:2024.6.15
  port: 8510
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    enabled: true
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilization: 75

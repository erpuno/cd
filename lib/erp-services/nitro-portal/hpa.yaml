apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nitro-portal
  namespace: erp-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nitro-portal
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75

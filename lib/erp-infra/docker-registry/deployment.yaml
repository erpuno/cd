apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: erp-core
  labels:
    app: docker-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      serviceAccountName: erp-core-sa
      containers:
      - name: registry
        image: registry:2.8.3
        ports:
        - name: http
          containerPort: 5000
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 512Mi
        volumeMounts:
        - name: storage
          mountPath: /var/lib/registry
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: registry-data

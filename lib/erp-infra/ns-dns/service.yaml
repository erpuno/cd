apiVersion: v1
kind: Service
metadata:
  name: ns-dns
  namespace: erp-infra
  labels:
    app: ns-dns
spec:
  type: ClusterIP
  ports:
  - name: dns-udp
    port: 53
    protocol: UDP
    targetPort: 53
  - name: dns-tcp
    port: 53
    protocol: TCP
    targetPort: 53
  selector:
    app: ns-dns

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ns-dns
  namespace: erp-infra
  labels:
    app: ns-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ns-dns
  template:
    metadata:
      labels:
        app: ns-dns
    spec:
      serviceAccountName: erp-infra-sa
      containers:
      - name: ns-dns
        image: erpuno/ns:latest
        command: ["bin/ns"]
        args: ["start"]
        imagePullPolicy: IfNotPresent
        ports:
        - name: dns-udp
          containerPort: 53
          protocol: UDP
        - name: dns-tcp
          containerPort: 53
          protocol: TCP
        env:
        - name: ERL_AFLAGS
          value: "+S 2 +SDcpu 2 +SDio 2 +MMscs 5 -sbt db"
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 500m
            memory: 4Gi

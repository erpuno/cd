apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: erp-infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik-ingress-controller
rules:
- apiGroups: [""]
  resources: ["services", "endpoints", "secrets", "endpointslices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions", "networking.k8s.io"]
  resources: ["ingresses", "ingressclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["traefik.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik-ingress-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
- kind: ServiceAccount
  name: traefik
  namespace: erp-infra
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: erp-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik
      containers:
      - name: traefik
        image: traefik:v3.3
        args:
        - --entrypoints.web.address=:80
        - --providers.kubernetesingress=true
        - --providers.kubernetesingress.ingressclass=traefik
        - --log.level=INFO
        ports:
        - containerPort: 80
          hostPort: 80
          name: web

apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: erp-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      containers:
      - name: traefik
        image: traefik:v3.3
        args:
        - --api.insecure=true
        - --api.dashboard=true
        - --entrypoints.web.address=:8080
        - --entrypoints.websecure.address=:8443
        - --providers.kubernetesingress=true
        - --providers.kubernetesingress.ingressclass=traefik
        - --providers.kubernetescrd=true
        - --log.level=INFO
        ports:
        - name: web
          containerPort: 8080
          hostPort: 8080
        - name: websecure
          containerPort: 8443
          hostPort: 8443
        - name: dashboard
          containerPort: 8081
          hostPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: erp-infra
spec:
  ports:
  - name: web
    port: 8080
    targetPort: 8080
  - name: websecure
    port: 8443
    targetPort: 8443
  - name: dashboard
    port: 8081
    targetPort: 8081
  selector:
    app: traefik
